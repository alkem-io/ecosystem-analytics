# Contract: GitHub Actions CI/CD Workflow
# This is the reference contract for the CI/CD pipeline.
# The actual implementation in .github/workflows/ci-cd.yml MUST match this structure.

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Required GitHub Secrets:
#   SCW_SECRET_KEY  - Scaleway API secret key for registry authentication
#   KUBECONFIG      - Raw kubeconfig YAML for production K8s cluster

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: rg.nl-ams.scw.cloud/alkemio/ecosystem-analytics
          tags: |
            type=sha

      - name: Login to Scaleway Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: rg.nl-ams.scw.cloud/alkemio
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=rg.nl-ams.scw.cloud/alkemio/ecosystem-analytics:main
          cache-to: type=inline

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Set Kubernetes context
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Deploy to Kubernetes
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          kubectl set image deployment/ecosystem-analytics \
            ecosystem-analytics=rg.nl-ams.scw.cloud/alkemio/ecosystem-analytics:sha-${SHORT_SHA} \
            --namespace=ecosystem-analytics

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/ecosystem-analytics \
            --namespace=ecosystem-analytics \
            --timeout=300s
