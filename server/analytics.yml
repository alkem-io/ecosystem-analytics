## Ecosystem Analytics — Server Configuration
## Values use ${ENV_VAR}:default syntax for env var substitution.

alkemio:
  server_url: ${ALKEMIO_SERVER_URL}:https://alkem.io
  graphql_endpoint: ${ALKEMIO_GRAPHQL_ENDPOINT}:https://alkem.io/api/private/graphql
  kratos_public_url: ${ALKEMIO_KRATOS_PUBLIC_URL}

# OIDC Relying Party — EA is its own Alkemio OAuth2/OIDC client (Ory Hydra).
# Two registrations: hosted `ecosystem-analytics` = confidential (client_secret_basic,
# secret backend-only); local `ecosystem-analytics-local` = public (none, PKCE-only,
# no secret). FR-006/FR-019.
#
# DEFAULTS BELOW ARE THE LOCAL PUBLIC CLIENT so a fresh checkout boots with ZERO
# .env edits (`pnpm run dev` just works). The HOSTED deploy MUST set every OIDC_*
# and SESSION_* env var EXPLICITLY (k8s manifest) — it can no longer rely on these
# defaults, since an unset var would now silently fall back to the local client.
oidc:
  issuer: ${OIDC_ISSUER}:https://identity.alkem.io/
  client_id: ${OIDC_CLIENT_ID}:ecosystem-analytics-local
  client_secret: "${OIDC_CLIENT_SECRET}:" # local: EMPTY (public); hosted: from k8s secret
  token_endpoint_auth_method: ${OIDC_TOKEN_AUTH_METHOD}:none # local public client; hosted sets client_secret_basic
  redirect_uri: ${OIDC_REDIRECT_URI}:http://localhost:5173/api/auth/oidc/callback # hosted overrides
  scopes: ${OIDC_SCOPES}:openid profile email offline_access alkemio
  audience: "${OIDC_AUDIENCE}:ecosystem-analytics" # aud accepted by Alkemio's Bearer validator
  preauth_ttl_minutes: ${OIDC_PREAUTH_TTL_MINUTES}:10

# EA's own server-side session. Browser holds only an opaque httpOnly cookie;
# access/refresh tokens are encrypted at rest in SQLite (FR-018/FR-018a).
session:
  cookie_domain: "${SESSION_COOKIE_DOMAIN}:" # empty (host-only) local; hosted sets .alkem.io
  idle_timeout_hours: ${SESSION_IDLE_TIMEOUT_HOURS}:8
  # Dev-only AES-256 key so local boots out of the box. Hosted MUST override with a
  # fresh key from the k8s secret — NEVER reuse this value in any shared/hosted env.
  enc_key: "${OIDC_SESSION_ENC_KEY}:GGvIJ/WJIRBGWoNO0thfWCd2XbEXqdhlokW+qVO484I="
  # CSV; CORS allow-list AND post-login returnTo allow-list. Includes BOTH dev
  # frontends (Explorer :5173, VNG :5174) so sign-in started on either lands back
  # on the right app. Hosted sets both subdomains.
  allowed_origins: "${SESSION_ALLOWED_ORIGINS}:http://localhost:5173,http://localhost:5174"

server:
  port: ${ECOSYSTEM_ANALYTICS_BACKEND_PORT}:4100

logging:
  level: ${LOG_LEVEL}:info
  console_enabled: ${LOG_CONSOLE_ENABLED}:true
  json: ${LOG_JSON}:false

cache:
  ttl_hours: ${CACHE_TTL_HOURS}:24

limits:
  max_spaces_per_query: ${MAX_SPACES_PER_QUERY}:100

openai:
  api_key: ${OPENAI_API_KEY}
  base_url: "${OPENAI_BASE_URL}:"
  model: gemini-2.5-flash
  max_tokens: 8192
  temperature: 0.3

query:
  session_ttl_minutes: 30
  max_query_length: 2000
  max_feedback_length: 5000

features:
  ai_query_enabled: ${FEATURE_AI_QUERY_ENABLED}:false

# VNG Kenniscentrum Innovatie frontend (feature 016-vng-frontend).
vng:
  # Innovation hub preselected on first load, resolved by nameID (independent of
  # whether the hub is listed in the platform store). Acceptance default below;
  # production sets VNG_DEFAULT_HUB_NAMEID=vih-test in its deployment env.
  default_hub_nameid: ${VNG_DEFAULT_HUB_NAMEID}:vnginnovationhub
  gemeentedelers_space_nameid: ${VNG_GD_SPACE_NAMEID}:gemeentedelers
  gd_cache_ttl_hours: ${VNG_GD_CACHE_TTL_HOURS}:168 # ~1 week (archival GD corpus)
  # Space tag (lower-cased) -> dashboard category key, per dimension. Keys are the
  # EXACT label strings the VNG Groei publisher emits as profile tags (see
  # vng-gemeente-delers publisher/src/groei/vocab.ts), lower-cased. Operator-editable.
  tag_category_mapping:
    nds:
      "cloud": cloud
      "data": data
      "artificiële intelligentie": ai
      "centrale (digitale) dienstverlening": dienstverlening
      "digitale weerbaarheid en autonomie": weerbaarheid
      "digitaal vakmanschap en moderne werkomgeving": vakmanschap
    vng2030:
      # Omkeringsthema's (the 6 shown on the VNG-2030 chart)
      "bedrijfsvoering & gemeentediensten": bedrijfsvoering
      "wonen en ruimte": wonen-ruimte
      "bestaanszekerheid": bestaanszekerheid
      "klimaat en energie": klimaat-energie
      "kansengelijkheid/jeugd": kansengelijkheid
      "vergrijzing/gezond leven": vergrijzing
