query organizationByID($id: UUID!) {
  lookup {
    organization(ID: $id) {
      id
      nameID
      profile {
        displayName
        description
        tagline
        avatar: visual(type: AVATAR) {
          uri
        }
        location {
          country
          city
          geoLocation {
            latitude
            longitude
          }
        }
        url
        references {
          name
          uri
          description
        }
        tagsets {
          name
          tags
          type
        }
      }
      website
      contactEmail
      roleSet {
        owners: usersInRole(role: OWNER) {
          id
          profile {
            displayName
          }
        }
        associates: usersInRole(role: ASSOCIATE) {
          id
        }
      }
    }
  }
}
