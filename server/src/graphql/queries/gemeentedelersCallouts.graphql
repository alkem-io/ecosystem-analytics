query GemeentedelersCallouts($nameId: NameID!) {
  lookupByName {
    space(NAMEID: $nameId) {
      id
      nameID
      collaboration {
        calloutsSet {
          callouts {
            id
            nameID
            framing {
              profile {
                displayName
                description
                tagsets {
                  name
                  tags
                }
              }
            }
          }
        }
      }
    }
  }
}
