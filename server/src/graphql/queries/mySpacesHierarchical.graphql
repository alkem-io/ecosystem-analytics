query mySpacesHierarchical($limit: Float = 200) {
  me {
    user {
      id
      nameID
      profile {
        displayName
        avatar: visual(type: AVATAR) {
          uri
        }
        location {
          country
          city
          geoLocation {
            latitude
            longitude
          }
        }
        url
      }
      email
    }
    spaceMembershipsHierarchical(limit: $limit) {
      space {
        ...SpaceGraphInfoFragment
      }
    }
  }
}
