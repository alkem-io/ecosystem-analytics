fragment spaceAboutFragment on SpaceAbout {
  id
  isContentPublic
  membership {
    myPrivileges
  }
  profile {
    id
    displayName
    tagline
    location {
      country
      city
      geoLocation {
        latitude
        longitude
      }
    }
    url
    avatar: visual(type: AVATAR) {
      uri
    }
    banner: visual(type: BANNER) {
      uri
    }
    bannerWide: visual(type: BANNER_WIDE) {
      uri
    }
    tagsets {
      name
      tags
      type
      allowedValues
    }
  }
}
