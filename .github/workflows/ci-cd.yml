name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Required GitHub Secrets (org-level, shared with other Alkemio repos):
#   REGISTRY_LOGIN_SERVER  - Scaleway Container Registry URL (e.g. rg.nl-ams.scw.cloud/alkemio)
#   REGISTRY_USERNAME      - Registry username (nologin for Scaleway)
#   REGISTRY_PASSWORD      - Scaleway API secret key
#   KUBECONFIG_SECRET_SCALEWAY_PROD - Raw kubeconfig YAML for production K8s cluster

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.REGISTRY_LOGIN_SERVER }}/ecosystem-analytics
          tags: |
            type=sha

      - name: Login to Scaleway Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.REGISTRY_LOGIN_SERVER }}/ecosystem-analytics:main
          cache-to: type=inline

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Set Kubernetes context
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG_SECRET_SCALEWAY_PROD }}

      - name: Deploy to Kubernetes
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          kubectl set image deployment/ecosystem-analytics \
            ecosystem-analytics=${{ secrets.REGISTRY_LOGIN_SERVER }}/ecosystem-analytics:sha-${SHORT_SHA} \
            --namespace=ecosystem-analytics

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/ecosystem-analytics \
            --namespace=ecosystem-analytics \
            --timeout=300s
