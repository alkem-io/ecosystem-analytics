query ActivityFeedGrouped($args: ActivityFeedGroupedQueryArgs) {
  activityFeedGrouped(args: $args) {
    id
    type
    createdDate
    triggeredBy {
      id
    }
    space {
      id
    }
    ... on ActivityLogEntryMemberJoined {
      contributor {
        id
      }
      contributorType
    }
  }
}
