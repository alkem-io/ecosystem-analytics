name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Required GitHub Secrets (org-level, shared with other Alkemio repos):
#   REGISTRY_LOGIN_SERVER  - Scaleway Container Registry URL (e.g. rg.nl-ams.scw.cloud/alkemio)
#   REGISTRY_USERNAME      - Registry username (nologin for Scaleway)
#   REGISTRY_PASSWORD      - Scaleway API secret key
#   KUBECONFIG_SECRET_SCALEWAY_PLATFORM - Raw kubeconfig YAML for production K8s cluster

jobs:
  typecheck:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [frontend, server]
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22.20.0'

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-${{ runner.os }}-${{ matrix.package }}-${{ hashFiles(format('{0}/pnpm-lock.yaml', matrix.package)) }}
          restore-keys: |
            pnpm-${{ runner.os }}-${{ matrix.package }}-

      - name: Install dependencies (${{ matrix.package }})
        working-directory: ${{ matrix.package }}
        run: pnpm install --frozen-lockfile

      # TS7 native typecheck gate (workspace#019-typescript-7-upgrade, US1/FR-007).
      # ecosystem-analytics/frontend + server are single-native installs (no API
      # consumer of the Compiler API) — this IS the only typecheck, not a second
      # opinion alongside a JS-line checker.
      - name: Native TypeScript typecheck (${{ matrix.package }})
        working-directory: ${{ matrix.package }}
        run: pnpm run typecheck:native

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.REGISTRY_LOGIN_SERVER }}/ecosystem-analytics
          tags: |
            type=sha

      - name: Login to Scaleway Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            BUILD_COMMIT=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.REGISTRY_LOGIN_SERVER }}/ecosystem-analytics:main
          cache-to: type=inline

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Set Kubernetes context
        uses: azure/k8s-set-context@v5.0.1
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG_SECRET_SCALEWAY_PLATFORM }}

      - name: Deploy to Kubernetes
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          kubectl set image deployment/ecosystem-analytics \
            ecosystem-analytics=${{ secrets.REGISTRY_LOGIN_SERVER }}/ecosystem-analytics:sha-${SHORT_SHA} \
            --namespace=ecosystem-analytics

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/ecosystem-analytics \
            --namespace=ecosystem-analytics \
            --timeout=300s
