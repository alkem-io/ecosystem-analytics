query organizationByID($id: UUID!) {
  lookup {
    organization(ID: $id) {
      id
      nameID
      profile {
        displayName
        avatar: visual(type: AVATAR) {
          uri
        }
        location {
          country
          city
          geoLocation {
            latitude
            longitude
          }
        }
        url
      }
      tagsets {
        name
        tags
        type
      }
    }
  }
}
